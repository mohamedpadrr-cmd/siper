<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>شاشة جامع الأمير فواز</title>
    <link href="https://fonts.googleapis.com" rel="stylesheet">
    <style>
        :root { --gold: #FFD700; --white: #ffffff; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Tajawal', sans-serif; }
        
        body { 
            background-color: #000; 
            width: 100vw; height: 100vh; 
            overflow: hidden; 
            display: flex; align-items: center; justify-content: center; 
        }

        .main-container {
            transform: rotate(90deg);
            width: 100vh; height: 100vw;
            display: grid;
            grid-template-columns: 20% 60% 20%; 
            background: linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.7)), 
                        url("bg.png") center/cover no-repeat;
            position: absolute;
            border: 5px solid var(--gold);
        }

        /* أعمدة الصلاة الجانبية */
        .prayer-column {
            display: flex; flex-direction: column;
            justify-content: space-around;
            background: rgba(0,0,0,0.5);
            padding: 1vh 0;
        }
        .border-right { border-right: 3px solid var(--gold); }
        .border-left { border-left: 3px solid var(--gold); }

        .prayer-card { text-align: center; }
        .p-label { font-size: 5vh; color: #fff; font-weight: 800; }
        .p-time { font-size: 7vh; color: var(--gold); font-weight: 900; }
        .p-suffix { font-size: 3vh; color: #fff; margin-right: 5px; }

        /* الجزء الأوسط */
        .center-content {
            display: flex; flex-direction: column;
            justify-content: space-between;
            padding: 2vh 0;
            text-align: center;
        }

        .mosque-name { 
            font-family: 'Amiri', serif; 
            font-size: 8vh; 
            color: var(--white); 
            text-shadow: 0 0 20px var(--gold);
            line-height: 1.2;
        }

        .date-text { font-size: 3vh; color: var(--gold); font-weight: 800; display: block; }

        /* تصغير الساعة لعدم التداخل */
        #clock { font-size: 18vh; font-weight: 900; color: var(--gold); line-height: 1; text-shadow: 0 0 40px #000; }
        #ampm { font-size: 5vh; color: var(--white); font-weight: 800; }

        /* ضبط العداد ليناسب المربع */
        .counter-box {
            background: rgba(255, 215, 0, 0.1);
            margin: 1vh 10vw;
            padding: 1.5vh;
            border-radius: 30px;
            border: 2px solid var(--gold);
        }
        #timer-label { font-size: 3.5vh; color: #fff; }
        #timer { font-size: 7vh; color: var(--gold); font-weight: 900; letter-spacing: 3px; }

        .zikr-box { height: 12vh; display: flex; align-items: center; justify-content: center; }
        #zikr { font-size: 6.5vh; font-weight: 800; color: var(--white); text-shadow: 3px 3px 15px #000; }
    </style>
</head>
<body>

<div class="main-container">
    <!-- اليمين -->
    <div class="prayer-column border-right" id="rightCol"></div>

    <!-- الوسط -->
    <div class="center-content">
        <div>
            <span id="hijri" class="date-text">--</span>
            <span id="miladi" class="date-text">--</span>
            <div class="mosque-name">جامع الأمير فواز</div>
        </div>

        <div>
            <div id="clock">00:00</div>
            <div id="ampm">--</div>
        </div>

        <div class="counter-box">
            <div id="timer-label">الصلاة القادمة بعد</div>
            <div id="timer">00:00:00</div>
        </div>

        <div class="zikr-box">
            <div id="zikr">أستغفر الله العظيم وأتوب إليه</div>
        </div>
    </div>

    <!-- اليسار -->
    <div class="prayer-column border-left" id="leftCol"></div>
</div>

<script>
    const prayerSchedule = [
        {name: "الفجر", h: 5, m: 10}, {name: "الشروق", h: 6, m: 34}, {name: "الظهر", h: 12, m: 20},
        {name: "العصر", h: 15, m: 34}, {name: "المغرب", h: 18, m: 6}, {name: "العشاء", h: 19, m: 31}
    ];

    function format12h(h, m) {
        let suffix = h >= 12 ? "م" : "ص";
        let h12 = h % 12 || 12;
        return `${String(h12).padStart(2,'0')}:${String(m).padStart(2,'0')} <span class="p-suffix">${suffix}</span>`;
    }

    function render() {
        const r = document.getElementById("rightCol");
        const l = document.getElementById("leftCol");
        prayerSchedule.forEach((p, i) => {
            const card = `<div class="prayer-card"><div class="p-label">${p.name}</div><div class="p-time">${format12h(p.h, p.m)}</div></div>`;
            if (i < 3) r.innerHTML += card; else l.innerHTML += card;
        });
    }

    function update() {
        const now = new Date();
        const [t, a] = now.toLocaleTimeString('en-US', {timeZone:'Asia/Riyadh', hour12:true, hour:'2-digit', minute:'2-digit'}).split(' ');
        document.getElementById("clock").innerText = t;
        document.getElementById("ampm").innerText = a === "AM" ? "صباحاً" : "مساءً";
        document.getElementById("miladi").innerText = now.toLocaleDateString('ar-SA', {weekday:'long', day:'numeric', month:'long'});
        document.getElementById("hijri").innerText = new Intl.DateTimeFormat('ar-SA-u-ca-islamic', {day:'numeric', month:'long', year:'numeric'}).format(now);

        let cur = now.getHours()*3600 + now.getMinutes()*60 + now.getSeconds();
        let next = 0;
        for(let p of prayerSchedule) {
            let ps = p.h*3600 + p.m*60;
            if(ps > cur) { next = ps; break; }
        }
        if(!next) next = prayerSchedule[0].h*3600 + prayerSchedule[0].m*60 + 86400;
        let diff = next - cur;
        let h = Math.floor(diff/3600), m = Math.floor((diff%3600)/60), s = diff%60;
        document.getElementById("timer").innerText = `${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
    }

    render(); update(); setInterval(update, 1000);
    const azkar = ["سبحان الله وبحمده", "لا إله إلا الله وحده لا شريك له", "اللهم صلِّ وسلم على نبينا محمد", "أستغفر الله العظيم وأتوب إليه"];
    let z = 0; setInterval(() => { document.getElementById("zikr").innerText = azkar[++z % azkar.length]; }, 15000);
</script>
</body>
</html>
