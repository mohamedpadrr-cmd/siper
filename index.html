<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>شاشة جامع الأمير فواز - النسخة الاحترافية</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --gold: #D4AF37;
            --white: #F5F5F5;
            --glass: rgba(0, 0, 0, 0.35);
            --iqama-color: #00FFCC;
            --danger: rgba(255, 68, 68, 0.7);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Tajawal', sans-serif;
        }

        body {
            background: #000;
            width: 100vw;
            height: 100vh;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .main-container {
            /* التعديل هنا فقط: تم تغيير 90 إلى -90 للتدوير يساراً */
            transform: rotate(-90deg);
            width: 100vh;
            height: 100vw;
            display: flex;
            flex-direction: column;
            background: linear-gradient(rgba(0,0,0,0.2), rgba(0,0,0,0.5)), url("bg.png") center/cover no-repeat;
            position: absolute;
            box-shadow: inset 0 0 100px rgba(0,0,0,0.5);
        }

        .top-section {
            height: 32vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 1.5vh;
            margin-top: 2vh;
        }

        .name-box {
            background: var(--glass);
            backdrop-filter: blur(15px);
            padding: 1.5vh 5vw;
            border-radius: 25px;
            border: 1px solid rgba(212, 175, 55, 0.3);
            text-align: center;
            min-width: 50vh;
        }

        .mosque-name {
            font-size: 4.8vh;
            color: white;
            font-weight: 900;
            text-shadow: 2px 2px 15px rgba(0,0,0,0.8);
        }

        .date-container {
            border-top: 1px solid rgba(212, 175, 55, 0.2);
            margin-top: 1vh;
            padding-top: 0.5vh;
            display: flex;
            justify-content: space-around;
            gap: 20px;
        }

        .date-info { font-size: 2.5vh; color: var(--gold); font-weight: 700; }
        .date-info.miladi { color: #fff; opacity: 0.9; }

        #clock { 
            font-size: 11vh; 
            font-weight: 900; 
            color: var(--gold); 
            text-shadow: 0 5px 20px rgba(0,0,0,0.9);
            line-height: 1;
        }
        #ampm { font-size: 3vh; color: white; font-weight: bold; text-shadow: 1px 1px 5px #000; }

        .zikr-section {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 0 8vw;
            text-align: center;
        }

        #zikr-display {
            font-size: 4.5vh;
            font-weight: 700;
            color: white;
            text-shadow: 0 4px 15px rgba(0,0,0,1);
            background: rgba(0,0,0,0.2);
            padding: 2.5vh 5vw;
            border-radius: 50px;
            line-height: 1.5;
            transition: opacity 0.8s ease-in-out;
        }

        .prayer-section {
            width: 94%;
            margin: 0 auto 5vh auto;
            background: rgba(0, 0, 0, 0.35);
            backdrop-filter: blur(12px);
            border-radius: 35px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 15px 35px rgba(0,0,0,0.6);
            overflow: hidden;
        }

        .next-prayer-box {
            background: rgba(212, 175, 55, 0.2);
            padding: 2vh;
            text-align: center;
            border-bottom: 1px solid rgba(212, 175, 55, 0.2);
            transition: all 0.5s;
        }

        #timer-label { font-size: 3.2vh; color: white; margin-left: 1.5vw; }
        #timer { font-size: 8.5vh; color: var(--gold); font-weight: 900; text-shadow: 2px 2px 10px #000; }

        .status-iqama { background: rgba(0, 255, 204, 0.15) !important; }
        .status-iqama #timer { color: var(--iqama-color) !important; text-shadow: 0 0 20px var(--iqama-color); }
        .status-now { background: var(--danger) !important; animation: blink 1s infinite; }

        @keyframes blink { 0% {opacity: 1;} 50% {opacity: 0.6;} 100% {opacity: 1;} }

        .prayer-header {
            display: grid;
            grid-template-columns: 1.5fr 1fr 1fr;
            padding: 2vh 6vw 1vh 6vw;
            color: var(--gold);
            font-size: 2.4vh;
            font-weight: 800;
            text-shadow: 1px 1px 3px #000;
        }

        .prayer-grid { display: flex; flex-direction: column; gap: 0.5vh; padding: 0 4vw 3vh 4vw; }
        
        .prayer-item {
            display: grid;
            grid-template-columns: 1.5fr 1fr 1fr;
            align-items: center;
            padding: 1.2vh 2vw;
            border-radius: 15px;
        }

        .p-name { font-size: 4.2vh; color: white; font-weight: 800; text-align: right; text-shadow: 2px 2px 5px #000; }
        .p-val { font-size: 4.5vh; color: var(--gold); font-weight: 900; text-align: center; text-shadow: 2px 2px 5px #000; }
        .iqama-val { font-size: 4.2vh; color: var(--iqama-color); font-weight: 800; text-align: center; text-shadow: 1px 1px 10px rgba(0,0,0,0.5); }
        
        .active-row { background: rgba(255, 255, 255, 0.12); border: 1px solid rgba(212, 175, 55, 0.4); }
    </style>
</head>
<body>

<div class="main-container">
    <div class="top-section">
        <div class="name-box">
            <div class="mosque-name">جامع الأمير فواز</div>
            <div class="date-container">
                <div id="hijri" class="date-info">--</div>
                <div id="miladi" class="date-info miladi">--</div>
            </div>
        </div>
        <div class="clock-box">
            <div id="clock">00:00:00</div>
            <div id="ampm">--</div>
        </div>
    </div>

    <div class="zikr-section">
        <div id="zikr-display">بِسْمِ اللَّهِ الرَّحْمَنِ الرَّحِيمِ</div>
    </div>

    <div class="prayer-section">
        <div class="next-prayer-box" id="timerBox">
            <span id="timer-label">جاري جلب المواقيت...</span>
            <span id="timer">00:00:00</span>
        </div>
        
        <div class="prayer-header">
            <div style="text-align: right;">الصلاة</div>
            <div style="text-align: center;">الأذان</div>
            <div style="text-align: center;">الإقامة</div>
        </div>
        <div class="prayer-grid" id="prayerContainer"></div>
    </div>
</div>

<script>
let prayerData = [
    {n:"الفجر", h:0, m:0, wait:25, key:"Fajr"},
    {n:"الشروق", h:0, m:0, wait:0, key:"Sunrise"},
    {n:"الظهر", h:0, m:0, wait:15, key:"Dhuhr"},
    {n:"العصر", h:0, m:0, wait:15, key:"Asr"},
    {n:"المغرب", h:0, m:0, wait:10, key:"Maghrib"},
    {n:"العشاء", h:0, m:0, wait:20, key:"Isha"}
];

const zikrList = [
    "سُبْحَانَ اللَّهِ وَبِحَمْدِهِ ، سُبْحَانَ اللَّهِ الْعَظِيمِ",
    "اللَّهُمَّ صَلِّ وَسَلِّمْ عَلَى نَبِيِّنَا مُحَمَّدٍ",
    "قال ﷺ: الـكلمة الطيبة صدقة",
    "أَسْتَغْفِرُ اللَّهَ الْعَظِيمَ وَأَتُوبُ إِلَيْهِ",
    "لَا حَوْلَ وَلَا قُوَّةَ إِلَّا بِاللَّهِ الْعَلِيِّ الْعَظِيمِ",
    "قال ﷺ: خيركم من تعلم القرآن وعلمه",
    "اللَّهُمَّ أَعِنِّي عَلَى ذِكْرِكَ وَشُكْرِكَ وَحُسْنِ عِبَادَتِكَ"
];

async function fetchPrayerTimes() {
    try {
        const response = await fetch('https://api.aladhan.com/v1/timingsByCity?city=Jeddah&country=Saudi+Arabia&method=4');
        const data = await response.json();
        const timings = data.data.timings;

        prayerData.forEach(p => {
            const [hrs, mins] = timings[p.key].split(':');
            p.h = parseInt(hrs);
            p.m = parseInt(mins);
        });

        init();
    } catch (error) {
        console.error("خطأ في جلب المواقيت:", error);
    }
}

function formatTime12(h, m, showSec = false, s = 0) {
    let h12 = h % 12 || 12;
    let timeStr = `${String(h12).padStart(2, '0')}:${String(m).padStart(2, '0')}`;
    if(showSec) timeStr += `:${String(s).padStart(2, '0')}`;
    return timeStr;
}

function init() {
    const container = document.getElementById("prayerContainer");
    container.innerHTML = "";
    prayerData.forEach((p, i) => {
        let iqTime = p.wait > 0 ? calculateIqamaTime(p.h, p.m, p.wait) : "--:--";
        container.innerHTML += `
            <div class="prayer-item" id="row-${i}">
                <div class="p-name">${p.n}</div>
                <div class="p-val">${formatTime12(p.h, p.m)}</div>
                <div class="iqama-val">${iqTime}</div>
            </div>`;
    });
}

function calculateIqamaTime(h, m, wait) {
    let total = h * 60 + m + wait;
    return formatTime12(Math.floor(total/60)%24, total%60);
}

function update() {
    const now = new Date();
    const ksa = new Date(now.toLocaleString("en-US", {timeZone: "Asia/Riyadh"}));
    let h = ksa.getHours(), m = ksa.getMinutes(), s = ksa.getSeconds();
    let currentSec = h * 3600 + m * 60 + s;

    document.getElementById("clock").innerText = formatTime12(h, m, true, s);
    document.getElementById("ampm").innerText = h >= 12 ? "مساءً" : "صباحاً";
    document.getElementById("miladi").innerText = now.toLocaleDateString('ar-EG', {day:'numeric', month:'long', year:'numeric'}) + " م";
    document.getElementById("hijri").innerText = new Intl.DateTimeFormat('ar-SA-u-ca-islamic', {day:'numeric', month:'long', year:'numeric'}).format(now);

    let nextIdx = -1, status = "to_azan", targetSec = 0;

    for (let i = 0; i < prayerData.length; i++) {
        let azanSec = prayerData[i].h * 3600 + prayerData[i].m * 60;
        let iqamaSec = prayerData[i].wait ? azanSec + (prayerData[i].wait * 60) : azanSec;

        if (currentSec >= azanSec && currentSec < azanSec + 60) {
            nextIdx = i; status = "now_azan"; break;
        }
        if (currentSec >= azanSec + 60 && currentSec < iqamaSec) {
            nextIdx = i; status = "to_iqama"; targetSec = iqamaSec; break;
        }
        if (currentSec >= iqamaSec && currentSec < iqamaSec + 120 && prayerData[i].wait > 0) {
            nextIdx = i; status = "now_prayer"; break;
        }
        if (currentSec < azanSec) {
            nextIdx = i; status = "to_azan"; targetSec = azanSec; break;
        }
    }

    if (nextIdx === -1) {
        nextIdx = 0; status = "to_azan"; targetSec = prayerData[0].h * 3600 + prayerData[0].m * 60 + 86400;
    }

    const timerBox = document.getElementById("timerBox");
    const label = document.getElementById("timer-label");
    const timerDisp = document.getElementById("timer");

    const rows = document.querySelectorAll(".prayer-item");
    if(rows.length > 0) {
        rows.forEach(el => el.classList.remove("active-row"));
        if(document.getElementById("row-" + nextIdx)) {
            document.getElementById("row-" + nextIdx).classList.add("active-row");
        }
    }

    timerBox.className = "next-prayer-box";

    if (status === "now_azan") {
        label.innerText = "حان الآن موعد أذان " + prayerData[nextIdx].n;
        timerDisp.innerText = "الله أكبر";
        timerBox.classList.add("status-now");
    } 
    else if (status === "to_iqama") {
        label.innerText = "متبقي على إقامة " + prayerData[nextIdx].n;
        timerBox.classList.add("status-iqama");
        countdown(targetSec - currentSec);
    } 
    else if (status === "now_prayer") {
        label.innerText = "صلاة " + prayerData[nextIdx].n;
        timerDisp.innerText = "أقيموا الصلاة";
        timerBox.classList.add("status-now");
    } 
    else {
        label.innerText = "متبقي على أذان " + prayerData[nextIdx].n;
        countdown(targetSec - currentSec);
    }
}

function countdown(diff) {
    let hh = Math.floor(diff / 3600), mm = Math.floor((diff % 3600) / 60), ss = diff % 60;
    document.getElementById("timer").innerText = `${String(hh).padStart(2, '0')}:${String(mm).padStart(2, '0')}:${String(ss).padStart(2, '0')}`;
}

let zIdx = 0;
setInterval(() => {
    const d = document.getElementById("zikr-display");
    if(!d) return;
    d.style.opacity = 0;
    setTimeout(() => {
        zIdx = (zIdx + 1) % zikrList.length;
        d.innerText = zikrList[zIdx];
        d.style.opacity = 1;
    }, 800);
}, 20000);

fetchPrayerTimes();
setInterval(fetchPrayerTimes, 3600000);
setInterval(update, 1000);
</script>
</body>
</html>
