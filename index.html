<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>شاشة جامع الأمير فواز</title>
    <link href="https://fonts.googleapis.com" rel="stylesheet">
    <style>
        :root { --gold: #FFD700; --white: #ffffff; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Tajawal', sans-serif; }
        
        body { 
            background-color: #000; 
            width: 100vw; height: 100vh; 
            overflow: hidden; 
            display: flex; align-items: center; justify-content: center; 
        }

        .main-container {
            transform: rotate(90deg);
            width: 100vh; height: 100vw;
            display: flex; flex-direction: column;
            background: linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.7)), 
                        url("bg.png") center/cover no-repeat;
            position: absolute;
            border: 4px solid var(--gold);
        }

        /* الجزء العلوي: الاسم والساعة والعداد */
        .top-section {
            height: 32vh;
            display: flex; flex-direction: column;
            justify-content: space-between;
            padding: 2vh 0;
            text-align: center;
        }
        .mosque-name { font-family: 'Amiri', serif; font-size: 7vh; color: var(--white); text-shadow: 0 0 15px var(--gold); }
        .clock-area { display: flex; align-items: center; justify-content: center; gap: 2vw; margin: 1vh 0; }
        #clock { font-size: 15vh; font-weight: 900; color: var(--gold); line-height: 1; }
        #ampm { font-size: 4.5vh; color: var(--white); }
        
        .counter-box {
            background: rgba(255, 215, 0, 0.15);
            margin: 0 15vw; padding: 1vh;
            border-radius: 20px; border: 1px solid var(--gold);
        }
        #timer-label { font-size: 2.8vh; color: #fff; }
        #timer { font-size: 5.5vh; color: var(--gold); font-weight: 900; }

        /* الجزء الأوسط: الأذكار (مرفوعة وموسعة) */
        .zikr-section {
            flex: 1;
            display: flex; align-items: center; justify-content: center;
            text-align: center; padding: 0 4vw;
        }
        #zikr { font-size: 7.5vh; font-weight: 800; color: var(--white); text-shadow: 3px 3px 20px #000; line-height: 1.3; }

        /* الجزء السفلي: مواقيت الصلاة (منظمة جداً) */
        .bottom-prayer-section {
            height: 35vh;
            display: grid;
            grid-template-columns: 1fr 1fr;
            border-top: 3px solid var(--gold);
            background: rgba(0,0,0,0.5);
        }

        .prayer-column {
            display: flex; flex-direction: column;
            justify-content: space-around;
            padding: 1vh 0;
        }
        .border-left { border-left: 2px solid rgba(255,215,0,0.3); }

        .prayer-card {
            display: flex; justify-content: space-between; align-items: center;
            padding: 0 4vw;
        }
        .p-label { font-size: 4.5vh; color: #fff; font-weight: 800; }
        .p-time { font-size: 6vh; color: var(--gold); font-weight: 900; }
        .p-suffix { font-size: 2.5vh; color: #fff; margin-right: 4px; }

        .date-bar { font-size: 2.8vh; color: var(--gold); font-weight: 700; margin-bottom: 0.5vh; }
    </style>
</head>
<body>

<div class="main-container">
    <div class="top-section">
        <div>
            <div class="date-bar"><span id="hijri">--</span> | <span id="miladi">--</span></div>
            <div class="mosque-name">جامع الأمير فواز</div>
        </div>
        <div class="clock-area">
            <div id="clock">00:00</div>
            <div id="ampm">--</div>
        </div>
        <div class="counter-box">
            <div id="timer-label">الصلاة القادمة بعد</div>
            <div id="timer">00:00:00</div>
        </div>
    </div>

    <div class="zikr-section">
        <div id="zikr">أستغفر الله العظيم وأتوب إليه</div>
    </div>

    <div class="bottom-prayer-section">
        <div class="prayer-column border-left" id="rightPr"></div>
        <div class="prayer-column" id="leftPr"></div>
    </div>
</div>

<script>
    const prayers = [
        {name: "الفجر", h: 5, m: 10}, {name: "الشروق", h: 6, m: 34}, {name: "الظهر", h: 12, m: 20},
        {name: "العصر", h: 15, m: 34}, {name: "المغرب", h: 18, m: 6}, {name: "العشاء", h: 19, m: 31}
    ];

    function format12(h, m) {
        let s = h >= 12 ? "م" : "ص";
        let h12 = h % 12 || 12;
        return `${String(h12).padStart(2,'0')}:${String(m).padStart(2,'0')} <span class="p-suffix">${s}</span>`;
    }

    function render() {
        const r = document.getElementById("rightPr"), l = document.getElementById("leftPr");
        prayers.forEach((p, i) => {
            const html = `<div class="prayer-card"><div class="p-label">${p.name}</div><div class="p-time">${format12(p.h, p.m)}</div></div>`;
            if (i < 3) r.innerHTML += html; else l.innerHTML += html;
        });
    }

    function update() {
        const now = new Date();
        const [t, a] = now.toLocaleTimeString('en-US', {timeZone:'Asia/Riyadh', hour12:true, hour:'2-digit', minute:'2-digit'}).split(' ');
        document.getElementById("clock").innerText = t;
        document.getElementById("ampm").innerText = a === "AM" ? "صباحاً" : "مساءً";
        document.getElementById("miladi").innerText = now.toLocaleDateString('ar-SA', {weekday:'long', day:'numeric', month:'long'});
        document.getElementById("hijri").innerText = new Intl.DateTimeFormat('ar-SA-u-ca-islamic', {day:'numeric', month:'long', year:'numeric'}).format(now);

        let cur = now.getHours()*3600 + now.getMinutes()*60 + now.getSeconds();
        let next = 0;
        for(let p of prayers) {
            let ps = p.h*3600 + p.m*60;
            if(ps > cur) { next = ps; break; }
        }
        if(!next) next = prayers[0].h*3600 + prayers[0].m*60 + 86400;
        let diff = next - cur;
        let h = Math.floor(diff/3600), m = Math.floor((diff%3600)/60), s = diff%60;
        document.getElementById("timer").innerText = `${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
    }

    render(); update(); setInterval(update, 1000);
    const azkar = ["سبحان الله وبحمده", "لا إله إلا الله وحده لا شريك له", "اللهم صلِّ وسلم على نبينا محمد", "أستغفر الله العظيم وأتوب إليه", "سبحان الله والحمد لله"];
    let z = 0; setInterval(() => { document.getElementById("zikr").innerText = azkar[++z % azkar.length]; }, 15000);
</script>
</body>
</html>
