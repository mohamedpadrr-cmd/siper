<!DOCTYPE html>

<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>مواقيت الصلاة - جامع الأمير فواز</title>

<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@500;800;900&display=swap" rel="stylesheet">

<style>
:root{
--gold-3d: linear-gradient(to bottom,#f1d592 0%,#d4af37 40%,#b2945e 100%);
--real-gold:#d4af37;
}

*{box-sizing:border-box;margin:0;padding:0}

body{
background:url('https://images.unsplash.com/photo-1591604129939-f1efa4d9f7fa?q=80&w=2000') center/cover no-repeat fixed;
color:#fff;
font-family:'Tajawal',sans-serif;
height:100vh;
overflow:hidden;
}

.wrapper{
height:100%;
display:flex;
flex-direction:column;
}

.top-bar{
background:rgba(0,0,0,.5);
display:flex;
justify-content:space-between;
padding:15px 50px;
border-bottom:2px solid var(--real-gold);
font-size:2rem;
font-weight:bold;
color:var(--real-gold);
text-shadow:2px 2px 4px #000;
}

.main-content{
display:grid;
grid-template-columns:420px 1fr;
gap:30px;
padding:30px;
flex:1;
align-items:center;
}

.left-panel{
background:rgba(0,0,0,.3);
border:1px solid rgba(212,175,55,.5);
border-radius:25px;
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
height:100%;
text-align:center;
}

#digi-time{
font-size:9rem;
font-weight:900;
color:var(--real-gold);
line-height:1;
}

#ampm{
font-size:3rem;
color:var(--real-gold);
margin-bottom:20px;
}

#countdown{
font-size:2rem;
margin-top:10px;
}

.center-panel{
display:flex;
align-items:center;
justify-content:center;
text-align:center;
}

#zikr-text{
font-size:5rem;
font-weight:900;
line-height:1.4;
color:var(--real-gold);
}

.bottom-grid{
display:grid;
grid-template-columns:repeat(6,1fr);
height:220px;
background:rgba(0,0,0,.7);
border-top:4px solid var(--real-gold);
}

.p-box{
border-left:1px solid rgba(212,175,55,.3);
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
}

.p-box.active{
background:rgba(212,175,55,.25);
border-top:10px solid var(--real-gold);
}

.p-box .name{
font-size:2rem;
margin-bottom:10px;
font-weight:bold;
}

.p-box .time{
font-size:3.5rem;
font-weight:900;
background:var(--gold-3d);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
}

/* Responsive */

@media(max-width:1400px){
#digi-time{font-size:7rem}
#zikr-text{font-size:3.5rem}
}

@media(max-width:1000px){

.main-content{
grid-template-columns:1fr;
}

#digi-time{
font-size:5rem;
}

#zikr-text{
font-size:2.5rem;
}

.bottom-grid{
grid-template-columns:repeat(3,1fr);
height:auto;
}

}
</style>

</head>

<body>

<div class="wrapper">

<div class="top-bar">
<div id="en-date">--</div>
<div style="font-size:2.5rem">جامع الأمير فواز - جدة</div>
<div id="ar-date">--</div>
</div>

<div class="main-content">

<div class="left-panel">

<div id="digi-time">00:00</div>
<div id="ampm">--</div>

<div style="font-size:1.8rem;margin-top:10px">
الصلاة القادمة
</div>

<div id="next-prayer-name" style="font-size:2.8rem;color:var(--real-gold)">
--
</div>

<div id="countdown">--</div>

</div>

<div class="center-panel">
<div id="zikr-text">جاري التحميل...</div>
</div>

</div>

<div class="bottom-grid" id="prayer-list"></div>

</div>

<script>

let prayerSchedule=[]

async function loadPrayerTimes(){

const url="https://api.aladhan.com/v1/timingsByCity?city=Jeddah&country=SA&method=4"

const res=await fetch(url)
const data=await res.json()

const t=data.data.timings

prayerSchedule=[
{n:'الفجر',t:formatTime(t.Fajr)},
{n:'الشروق',t:formatTime(t.Sunrise)},
{n:'الظهر',t:formatTime(t.Dhuhr)},
{n:'العصر',t:formatTime(t.Asr)},
{n:'المغرب',t:formatTime(t.Maghrib)},
{n:'العشاء',t:formatTime(t.Isha)}
]

updateDashboard()

}

function formatTime(time){

let [h,m]=time.split(":")
h=parseInt(h)

let p="ص"

if(h>=12){
p="م"
if(h>12)h-=12
}

return `${h}:${m} ${p}`

}

function updateDashboard(){

if(prayerSchedule.length===0) return

const now=new Date()

let h=now.getHours()
const m=String(now.getMinutes()).padStart(2,"0")

document.getElementById("digi-time").innerText=`${h%12||12}:${m}`
document.getElementById("ampm").innerText=h>=12?"مساءً":"صباحاً"

document.getElementById("en-date").innerText=
now.toLocaleDateString("en-US",{weekday:"long",month:"long",day:"numeric",year:"numeric"})

document.getElementById("ar-date").innerText=
new Intl.DateTimeFormat("ar-SA-u-ca-islamic-umalqura",
{day:"numeric",month:"long",year:"numeric",weekday:"long"}).format(now)

const currentMinutes=h*60+now.getMinutes()

let nextIndex=0

for(let i=0;i<prayerSchedule.length;i++){

let [time,period]=prayerSchedule[i].t.split(" ")
let [ph,pm]=time.split(":").map(Number)

if(period==="م" && ph!==12) ph+=12
if(period==="ص" && ph===12) ph=0

let prayerMinutes=ph*60+pm

if(currentMinutes<prayerMinutes){
nextIndex=i
break
}

if(i===prayerSchedule.length-1) nextIndex=0

}

document.getElementById("next-prayer-name").innerText=prayerSchedule[nextIndex].n

updateCountdown(prayerSchedule[nextIndex].t)

const grid=document.getElementById("prayer-list")

grid.innerHTML=prayerSchedule.map((p,index)=>`
<div class="p-box ${index===nextIndex?'active':''}">
<div class="name">${p.n}</div>
<div class="time">${p.t}</div>
</div>
`).join("")

}

function updateCountdown(nextTime){

const now=new Date()

const [time,period]=nextTime.split(" ")
let [h,m]=time.split(":").map(Number)

if(period==="م" && h!==12) h+=12
if(period==="ص" && h===12) h=0

const target=new Date()

target.setHours(h,m,0)

if(target<now) target.setDate(target.getDate()+1)

const diff=target-now

const hours=Math.floor(diff/1000/60/60)
const mins=Math.floor(diff/1000/60)%60
const secs=Math.floor(diff/1000)%60

document.getElementById("countdown").innerText=`${hours}:${mins}:${secs}`

}

const azkar=[
"سبحان الله وبحمده سبحان الله العظيم",
"لا إله إلا الله وحده لا شريك له",
"اللهم صل وسلم على نبينا محمد",
"أستغفر الله العظيم وأتوب إليه"
]

let z=0

function cycleZikr(){
document.getElementById("zikr-text").innerText=azkar[z]
z=(z+1)%azkar.length
}

setInterval(cycleZikr,20000)
setInterval(updateDashboard,1000)

cycleZikr()
loadPrayerTimes()

</script>

</body>
</html>
