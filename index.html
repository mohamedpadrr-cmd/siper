<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>شاشة المسجد الاحترافية - 85 بوصة</title>
    <link href="https://fonts.googleapis.com" rel="stylesheet">
    <style>
        :root {
            --gold: #FFD700;
            --white: #ffffff;
            --overlay: rgba(0, 0, 0, 0.7); 
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Tajawal', sans-serif;
        }

        body {
            background-color: #000;
            width: 100vw;
            height: 100vh;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* حاوية التدوير الطولي */
        .main-container {
            transform: rotate(90deg);
            width: 100vh; 
            height: 100vw;
            display: flex;
            flex-direction: column;
            /* خلفية إسلامية بديلة ومستقرة */
            background-image: linear-gradient(var(--overlay), var(--overlay)), 
                              url("https://cdn.pixabay.com");
            background-size: cover;
            background-position: center;
            position: absolute;
        }

        /* التاريخ العلوي */
        .header {
            height: 10vh;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 6vw;
            border-bottom: 4px solid var(--gold);
            background: rgba(0,0,0,0.5);
        }

        .date-text {
            font-size: 3.5vh;
            color: var(--gold);
            font-weight: 800;
        }

        .mosque-name {
            text-align: center;
            font-size: 6vh;
            font-weight: 900;
            color: var(--white);
            margin-top: 3vh;
            text-shadow: 4px 4px 15px #000;
        }

        /* الساعة */
        .clock-section {
            text-align: center;
            margin-top: 5vh;
        }

        #clock {
            font-size: 24vh;
            font-weight: 900;
            color: var(--gold);
            line-height: 0.85;
            text-shadow: 0 0 40px rgba(0,0,0,0.9);
        }

        #ampm-main {
            font-size: 6vh;
            color: var(--white);
            font-weight: 700;
            display: block;
            margin-top: 1vh;
        }

        /* الأذكار */
        .zikr-area {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 0 8vw;
        }

        #zikr {
            font-size: 7.5vh;
            font-weight: 800;
            color: var(--white);
            line-height: 1.4;
            text-shadow: 5px 5px 20px #000;
        }

        /* مواقيت الصلاة (3 فوق 3) */
        .prayer-grid {
            height: 35vh;
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            grid-template-rows: repeat(2, 1fr);
            background: rgba(0, 0, 0, 0.85);
            border-top: 6px solid var(--gold);
        }

        .prayer-card {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            border: 1px solid rgba(255, 215, 0, 0.2);
        }

        .p-label {
            font-size: 4vh;
            color: #eee;
            font-weight: 800;
            margin-bottom: 0.5vh;
        }

        .p-time {
            font-size: 6.5vh;
            color: var(--gold);
            font-weight: 900;
        }

        .p-suffix {
            font-size: 2.5vh;
            color: var(--white);
            font-weight: 500;
            margin-right: 5px;
        }
    </style>
</head>
<body>

<div class="main-container">
    <div class="header">
        <div id="hijri" class="date-text">--</div>
        <div id="miladi" class="date-text">--</div>
    </div>

    <div class="mosque-name">جامع الأمير فواز – جدة</div>

    <div class="clock-section">
        <div id="clock">00:00</div>
        <div id="ampm-main">--</div>
    </div>

    <div class="zikr-area">
        <div id="zikr">أستغفر الله العظيم وأتوب إليه</div>
    </div>

    <div class="prayer-grid" id="prayerGrid">
        <!-- يتم التوليد عبر JS -->
    </div>
</div>

<script>
    // مواقيت الصلاة (محدثة بنظام 12 ساعة يدوي للعرض)
    const prayerTimes = [
        {name: "الفجر", time: "05:21", suffix: "ص"},
        {name: "الشروق", time: "06:38", suffix: "ص"},
        {name: "الظهر", time: "12:31", suffix: "م"},
        {name: "العصر", time: "03:52", suffix: "م"},
        {name: "المغرب", time: "06:24", suffix: "م"},
        {name: "العشاء", time: "07:54", suffix: "م"}
    ];

    const grid = document.getElementById("prayerGrid");
    prayerTimes.forEach(p => {
        const div = document.createElement("div");
        div.className = "prayer-card";
        div.innerHTML = `
            <div class="p-label">${p.name}</div>
            <div class="p-time">${p.time}<span class="p-suffix">${p.suffix}</span></div>
        `;
        grid.appendChild(div);
    });

    function update() {
        const now = new Date();
        
        // عرض الساعة الرئيسية بنظام 12 ساعة
        let h = now.getHours();
        let m = String(now.getMinutes()).padStart(2, '0');
        let h12 = h % 12 || 12;
        document.getElementById("clock").innerText = h12 + ":" + m;
        document.getElementById("ampm-main").innerText = h >= 12 ? "مساءً" : "صباحاً";

        // التواريخ العربية
        const options = { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' };
        document.getElementById("miladi").innerText = now.toLocaleDateString('ar-SA', options);
        document.getElementById("hijri").innerText = new Intl.DateTimeFormat('ar-SA-u-ca-islamic', options).format(now);
    }

    const azkar = [
        "سبحان الله وبحمده.. سبحان الله العظيم",
        "لا إله إلا الله وحده لا شريك له",
        "اللهم صلِّ وسلم على نبينا محمد",
        "أستغفر الله العظيم وأتوب إليه",
        "لا حول ولا قوة إلا بالله العلي العظيم"
    ];
    let zIndex = 0;
    setInterval(() => {
        document.getElementById("zikr").innerText = azkar[zIndex];
        zIndex = (zIndex + 1) % azkar.length;
    }, 15000);

    setInterval(update, 1000);
    update();
</script>

</body>
</html>
