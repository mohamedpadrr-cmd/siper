<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>شاشة المسجد - جامع الأمير فواز</title>
    <link href="https://fonts.googleapis.com" rel="stylesheet">
    <style>
        :root { --gold: #FFD700; --white: #ffffff; }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Tajawal', sans-serif; }

        body {
            background-color: #000;
            width: 100vw; height: 100vh;
            overflow: hidden;
            display: border-box; align-items: center; justify-content: center;
        }

        /* حاوية التدوير الطولي */
        .main-container {
            transform: rotate(90deg);
            width: 100vh; height: 100vw;
            display: flex; flex-direction: column;
            
            /* تم تغيير الامتداد هنا ليكون bg.png */
            background: linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.5)), 
                        url("bg.png") center/100% 100% no-repeat;
            position: absolute;
        }

        /* الجزء العلوي */
        .header {
            height: 12vh;
            display: flex; justify-content: space-between; align-items: center;
            padding: 0 6vw; border-bottom: 5px solid var(--gold);
            background: rgba(0,0,0,0.3);
        }

        .date-text { font-size: 3.5vh; color: var(--gold); font-weight: 800; }
        .mosque-name { text-align: center; font-size: 7vh; font-weight: 900; color: var(--white); margin-top: 4vh; text-shadow: 4px 4px 15px #000; }

        /* الساعة المركزية */
        .clock-section { text-align: center; margin-top: 5vh; }
        #clock { font-size: 26vh; font-weight: 900; color: var(--gold); line-height: 0.85; text-shadow: 0 0 50px rgba(0,0,0,1); }
        #ampm { font-size: 7vh; color: var(--white); font-weight: 800; display: block; }

        /* الأذكار */
        .zikr-area { flex: 1; display: flex; align-items: center; justify-content: center; text-align: center; padding: 0 8vw; }
        #zikr { font-size: 7.5vh; font-weight: 800; color: var(--white); text-shadow: 5px 5px 25px #000; }

        /* مواقيت الصلاة */
        .prayer-grid {
            height: 35vh;
            display: grid; grid-template-columns: repeat(3, 1fr); grid-template-rows: repeat(2, 1fr);
            background: rgba(0, 0, 0, 0.8); border-top: 6px solid var(--gold);
        }

        .prayer-card { display: flex; flex-direction: column; align-items: center; justify-content: center; border: 1px solid rgba(255, 215, 0, 0.2); }
        .p-label { font-size: 4.5vh; color: #eee; font-weight: 800; }
        .p-time { font-size: 7.5vh; color: var(--gold); font-weight: 900; }
        .p-suffix { font-size: 3vh; color: #fff; margin-right: 5px; }
    </style>
</head>
<body>

<div class="main-container">
    <div class="header">
        <div id="hijri" class="date-text">--</div>
        <div id="miladi" class="date-text">--</div>
    </div>

    <div class="mosque-name">جامع الأمير فواز – جدة</div>

    <div class="clock-section">
        <div id="clock">00:00</div>
        <div id="ampm">--</div>
    </div>

    <div class="zikr-area">
        <div id="zikr">أستغفر الله العظيم وأتوب إليه</div>
    </div>

    <div class="prayer-grid" id="prayerGrid"></div>
</div>

<script>
    const prayerTimes = [
        {name: "الفجر", time: "05:10", suf: "ص"},
        {name: "الشروق", time: "06:34", suf: "ص"},
        {name: "الظهر", time: "12:20", suf: "م"},
        {name: "العصر", time: "03:34", suf: "م"},
        {name: "المغرب", time: "06:06", suf: "م"},
        {name: "العشاء", time: "07:31", suf: "م"}
    ];

    const grid = document.getElementById("prayerGrid");
    prayerTimes.forEach(p => {
        const div = document.createElement("div");
        div.className = "prayer-card";
        div.innerHTML = `<div class="p-label">${p.name}</div><div class="p-time">${p.time}<span class="p-suffix">${p.suf}</span></div>`;
        grid.appendChild(div);
    });

    function updateJeddahTime() {
        const now = new Date();
        const jeddahTime = now.toLocaleTimeString('en-US', { timeZone: 'Asia/Riyadh', hour12: true, hour: '2-digit', minute: '2-digit' });
        
        const [time, ampm] = jeddahTime.split(' ');
        document.getElementById("clock").innerText = time;
        document.getElementById("ampm").innerText = ampm === "AM" ? "صباحاً" : "مساءً";

        const options = { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' };
        document.getElementById("miladi").innerText = now.toLocaleDateString('ar-SA', options);
        document.getElementById("hijri").innerText = new Intl.DateTimeFormat('ar-SA-u-ca-islamic', options).format(now);
    }

    const azkar = ["سبحان الله وبحمده", "لا إله إلا الله وحده لا شريك له", "اللهم صلِّ وسلم على نبينا محمد", "أستغفر الله العظيم وأتوب إليه"];
    let zIndex = 0;
    setInterval(() => {
        document.getElementById("zikr").innerText = azkar[zIndex];
        zIndex = (zIndex + 1) % azkar.length;
    }, 15000);

    setInterval(updateJeddahTime, 1000);
    updateJeddahTime();
</script>

</body>
</html>
