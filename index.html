<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>شاشة جامع الأمير فواز - النسخة المصلحة</title>
    <link href="https://fonts.googleapis.com" rel="stylesheet">
    <style>
        :root { --gold: #FFD700; --white: #F5F5F5; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Tajawal', sans-serif; }
        
        body { 
            background-color: #000; width: 100vw; height: 100vh; 
            overflow: hidden; display: flex; align-items: center; justify-content: center; 
        }

        /* الحاوية الرئيسية مع دوران 90 درجة */
        .main-container {
            transform: rotate(90deg);
            width: 100vh; /* العرض الفيزيائي للشاشة */
            height: 100vw; /* الارتفاع الفيزيائي للشاشة */
            display: flex; 
            flex-direction: row; /* الترتيب هنا سيصبح عمودياً عند التدوير */
            background: linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.7)), 
                        url("bg.png") center/cover no-repeat;
            position: absolute;
            border: 4px solid var(--gold);
        }

        /* القسم العلوي (سيظهر في أعلى الشاشة الطولية) */
        .section-top {
            width: 32%; /* يمثل الجزء العلوي من الشاشة */
            display: flex; flex-direction: column;
            justify-content: center; align-items: center;
            border-left: 2px solid rgba(255,215,0,0.3);
            padding: 2vh;
        }

        .mosque-name { font-family: 'Amiri', serif; font-size: 7.5vh; color: var(--white); text-shadow: 0 0 15px var(--gold); margin-bottom: 1vh; }
        .clock-box { text-align: center; margin-bottom: 2vh; }
        #clock { font-size: 15vh; font-weight: 900; color: var(--gold); line-height: 1; }
        #ampm { font-size: 5vh; color: var(--white); font-weight: 800; display: block; }
        .date-info { font-size: 2.4vh; color: var(--gold); font-weight: 700; margin-top: 1vh; white-space: nowrap; }

        /* القسم الأوسط (الأذكار) */
        .section-middle {
            width: 30%; /* يمثل منتصف الشاشة */
            display: flex; align-items: center; justify-content: center;
            text-align: center; padding: 0 4vw;
            border-left: 2px solid rgba(255,215,0,0.3);
        }
        #zikr { font-size: 7.5vh; font-weight: 800; color: var(--white); text-shadow: 4px 4px 15px #000; line-height: 1.4; transition: opacity 0.5s; }

        /* القسم السفلي (العداد ومواقيت الصلاة) */
        .section-bottom {
            width: 38%; /* يمثل أسفل الشاشة */
            display: flex; flex-direction: column;
            justify-content: space-between;
            padding: 2vh 0;
        }

        /* العداد داخل الجزء السفلي */
        .counter-container {
            background: rgba(255, 215, 0, 0.15);
            margin: 0 2vh 2vh 2vh; padding: 1.5vh;
            border-radius: 20px; border: 2px solid var(--gold);
            text-align: center;
        }
        #timer-label { font-size: 3vh; color: var(--white); margin-bottom: 0.5vh; }
        #timer { font-size: 7vh; color: var(--gold); font-weight: 900; letter-spacing: 5px; }

        /* شبكة مواقيت الصلاة (3 يمين و 3 يسار) */
        .prayer-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            height: 100%;
            padding: 0 2vh;
        }
        .prayer-column { display: flex; flex-direction: column; justify-content: space-around; }
        .p-item { display: flex; justify-content: space-between; align-items: center; padding: 0 3vw; }
        .p-name { font-size: 4.5vh; color: var(--white); font-weight: 800; }
        .p-val-box { display: flex; align-items: baseline; white-space: nowrap; }
        .p-val { font-size: 6.5vh; color: var(--gold); font-weight: 900; }
        .p-suf { font-size: 3vh; color: var(--white); margin-right: 10px; font-weight: 700; }

    </style>
</head>
<body>

<div class="main-container">
    <!-- الجزء العلوي: ساعة واسم -->
    <div class="section-top">
        <div class="mosque-name">جامع الأمير فواز</div>
        <div class="clock-box">
            <div id="clock">00:00</div>
            <div id="ampm">--</div>
        </div>
        <div class="date-info"><span id="hijri">--</span> | <span id="miladi">--</span></div>
    </div>

    <!-- الجزء الأوسط: الأذكار -->
    <div class="section-middle">
        <div id="zikr">أستغفر الله العظيم وأتوب إليه</div>
    </div>

    <!-- الجزء السفلي: عداد وصلوات -->
    <div class="section-bottom">
        <div class="counter-container">
            <div id="timer-label">الصلاة القادمة بعد</div>
            <div id="timer">00:00:00</div>
        </div>
        
        <div class="prayer-grid">
            <div class="prayer-column" id="rCol"></div>
            <div class="prayer-column" id="lCol" style="border-right: 2px solid rgba(255,215,0,0.2);"></div>
        </div>
    </div>
</div>

<script>
    const prayerData = [
        {n: "الفجر", h: 5, m: 10}, {n: "الشروق", h: 6, m: 34}, {n: "الظهر", h: 12, m: 20},
        {n: "العصر", h: 15, m: 34}, {n: "المغرب", h: 18, m: 6}, {n: "العشاء", h: 19, m: 31}
    ];

    const azkar = [
        "قال ﷺ: كَلِمَتَانِ خَفِيفَتَانِ عَلَى اللِّسَانِ ثَقِيلَتَانِ فِي الْمِيزَانِ: سُبْحَانَ اللهِ وَبِحَمْدِهِ سُبْحَانَ اللهِ الْعَظِيمِ",
        "قال ﷺ: مَنْ صَلَّى عَلَيَّ صَلَاةً وَاحِدَةً صَلَّى اللهُ عَلَيْهِ بِهَا عَشْرًا",
        "قال ﷺ: لَا حَوْلَ وَلَا قُوَّةَ إِلَّا بِاللهِ كَنْزٌ مِنْ كُنُوزِ الْجَنَّةِ",
        "أستغفر الله العظيم وأتوب إليه",
        "لا إله إلا الله وحده لا شريك له، له الملك وله الحمد وهو على كل شيء قدير",
        "يا حي يا قيوم برحمتك أستغيث، أصلح لي شأني كله ولا تكلني إلى نفسي طرفة عين"
    ];

    function fmt12(h, m) {
        let s = h >= 12 ? "م" : "ص";
        let h12 = h % 12 || 12;
        return `<div class="p-val-box"><span class="p-val">${String(h12).padStart(2,'0')}:${String(m).padStart(2,'0')}</span><span class="p-suf">${s}</span></div>`;
    }

    function init() {
        const r = document.getElementById("rCol"), l = document.getElementById("lCol");
        prayerData.forEach((p, i) => {
            const h = `<div class="p-item"><div class="p-name">${p.n}</div>${fmt12(p.h, p.m)}</div>`;
            if (i < 3) r.innerHTML += h; else l.innerHTML += h;
        });
    }

    function update() {
        const now = new Date();
        const [t, a] = now.toLocaleTimeString('en-US', {timeZone:'Asia/Riyadh', hour12:true, hour:'2-digit', minute:'2-digit'}).split(' ');
        document.getElementById("clock").innerText = t;
        document.getElementById("ampm").innerText = a === "AM" ? "صباحاً" : "مساءً";
        document.getElementById("miladi").innerText = now.toLocaleDateString('ar-SA', {day:'numeric', month:'long', year:'numeric'});
        document.getElementById("hijri").innerText = new Intl.DateTimeFormat('ar-SA-u-ca-islamic', {day:'numeric', month:'long', year:'numeric'}).format(now);

        let cur = now.getHours()*3600 + now.getMinutes()*60 + now.getSeconds();
        let next = 0;
        for(let p of prayerData) {
            let ps = p.h*3600 + p.m*60;
            if(ps > cur) { next = ps; break; }
        }
        if(!next) next = prayerData[0].h*3600 + prayerData[0].m*60 + 86400;
        let diff = next - cur;
        let h = Math.floor(diff/3600), m = Math.floor((diff%3600)/60), s = diff%60;
        document.getElementById("timer").innerText = `${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
    }

    init(); update(); setInterval(update, 1000);
    let z = 0; setInterval(() => { 
        const zElem = document.getElementById("zikr");
        zElem.style.opacity = 0;
        setTimeout(() => { zElem.innerText = azkar[++z % azkar.length]; zElem.style.opacity = 1; }, 500);
    }, 20000);
</script>
</body>
</html>
