<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>شاشة جامع الأمير فواز - النسخة السماوية الفخمة</title>
    <link href="https://fonts.googleapis.com" rel="stylesheet">
    <style>
        :root { 
            --gold: #FFD700; 
            --white: #F5F5F5; 
            --cyan-3d: #00E5FF; /* لون سماوي فخم */
        }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Tajawal', sans-serif; }
        
        body { 
            background-color: #000; width: 100vw; height: 100vh; 
            overflow: hidden; display: flex; align-items: center; justify-content: center; 
        }

        .main-container {
            transform: rotate(90deg);
            width: 100vh; height: 100vw;
            display: flex; flex-direction: column;
            background: linear-gradient(rgba(0,0,0,0.75), rgba(0,0,0,0.75)), 
                        url("bg.png") center/cover no-repeat;
            position: absolute; border: 4px solid var(--gold);
        }

        /* 1. الجزء العلوي */
        .top-section {
            height: 38vh;
            display: flex; flex-direction: column;
            justify-content: flex-start; text-align: center;
            padding-top: 4vh;
        }
        .mosque-name { font-family: 'Amiri', serif; font-size: 7.5vh; color: var(--white); text-shadow: 0 0 20px var(--gold), 0 0 10px var(--gold); }
        .date-info { font-size: 2.8vh; color: var(--gold); font-weight: 700; margin-top: 1vh; }
        
        .clock-area { display: flex; align-items: center; justify-content: center; gap: 2vw; margin-top: 6vh; }
        #clock { font-size: 17vh; font-weight: 900; color: var(--gold); line-height: 0.8; text-shadow: 0 0 40px #000; }
        #ampm { font-size: 5.5vh; color: var(--white); font-weight: 800; }

        /* 2. الجزء الأوسط: الأذكار */
        .zikr-section {
            flex: 1; display: flex; align-items: center; justify-content: center;
            text-align: center; padding: 0 6vw;
        }
        #zikr { 
            font-size: 7.5vh; font-weight: 800; color: var(--white); 
            text-shadow: 0 0 25px var(--gold), 0 0 10px rgba(255,215,0,0.5), 3px 3px 10px #000; 
            line-height: 1.4; transition: opacity 0.6s ease-in-out; 
        }

        /* 3. الجزء السفلي: مواقيت الصلاة (سماوي 3D) */
        .prayer-section {
            height: 42vh;
            display: flex; flex-direction: column;
            border-top: 4px solid var(--gold); background: rgba(0,0,0,0.8);
        }

        .next-prayer-box {
            background: rgba(0, 229, 255, 0.1); /* خلفية سماوية خفيفة */
            padding: 1vh; border-bottom: 2px solid var(--cyan-3d);
            text-align: center;
        }
        #timer-label { font-size: 3vh; color: var(--white); font-weight: 700; }
        #timer { 
            font-size: 7vh; color: var(--cyan-3d); font-weight: 900; letter-spacing: 5px;
            text-shadow: 0 0 15px var(--cyan-3d), 0 0 5px #fff; /* تأثير 3D للعداد */
        }

        .prayer-grid {
            flex: 1; display: grid; grid-template-columns: 1fr 1fr;
            padding: 1vh 2vh;
        }
        .prayer-col { display: flex; flex-direction: column; justify-content: space-around; }
        .v-line { border-left: 2px solid rgba(0, 229, 255, 0.3); }

        .prayer-item { display: flex; justify-content: space-between; align-items: center; padding: 0 4vw; }
        .p-name { font-size: 4.8vh; color: var(--white); font-weight: 800; }
        
        /* أرقام الصلاة السماوية بتأثير 3D */
        .p-val-box { display: flex; align-items: baseline; white-space: nowrap; }
        .p-val { 
            font-size: 6.5vh; 
            color: var(--cyan-3d); 
            font-weight: 900; 
            text-shadow: 0 0 15px var(--cyan-3d), 0 0 5px #fff, 3px 3px 5px #000; /* تأثير البروز 3D */
        }
        .p-suf { font-size: 3vh; color: var(--white); margin-right: 10px; font-weight: 700; }
    </style>
</head>
<body>

<div class="main-container">
    <div class="top-section">
        <div class="mosque-name">جامع الأمير فواز</div>
        <div class="date-info">
            <span id="hijri">--</span> | <span id="miladi">--</span>
        </div>
        <div class="clock-area">
            <div id="clock">00:00</div>
            <div id="ampm">--</div>
        </div>
    </div>

    <div class="zikr-section">
        <div id="zikr">أستغفر الله العظيم وأتوب إليه</div>
    </div>

    <div class="prayer-section">
        <div class="next-prayer-box">
            <span id="timer-label">الصلاة القادمة بعد: </span>
            <span id="timer">00:00:00</span>
        </div>
        
        <div class="prayer-grid">
            <div class="prayer-col v-line" id="rCol"></div>
            <div class="prayer-col" id="lCol"></div>
        </div>
    </div>
</div>

<script>
    const prayerData = [
        {n: "الفجر", h: 5, m: 10}, {n: "الشروق", h: 6, m: 34}, {n: "الظهر", h: 12, m: 20},
        {n: "العصر", h: 15, m: 34}, {n: "المغرب", h: 18, m: 6}, {n: "العشاء", h: 19, m: 31}
    ];

    const azkar = [
        "قال ﷺ: كَلِمَتَانِ خَفِيفَتَانِ عَلَى اللِّسَانِ ثَقِيلَتَانِ فِي الْمِيزَانِ: سُبْحَانَ اللهِ وَبِحَمْدِهِ سُبْحَانَ اللهِ الْعَظِيمِ",
        "قال ﷺ: مَنْ صَلَّى عَلَيَّ صَلَاةً وَاحِدَةً صَلَّى اللهُ عَلَيْهِ بِهَا عَشْرًا",
        "قال ﷺ: لَا حَوْلَ وَلَا قُوَّةَ إِلَّا بِاللهِ كَنْزٌ مِنْ كُنُوزِ الْجَنَّةِ",
        "لا إله إلا الله وحده لا شريك له، له الملك وله الحمد وهو على كل شيء قدير",
        "يا حي يا قيوم برحمتك أستغيث، أصلح لي شأني كله ولا تكلني إلى نفسي طرفة عين",
        "أستغفر الله العظيم وأتوب إليه"
    ];

    function fmt12(h, m) {
        let s = h >= 12 ? "م" : "ص";
        let h12 = h % 12 || 12;
        return `<div class="p-val-box"><span class="p-val">${String(h12).padStart(2,'0')}:${String(m).padStart(2,'0')}</span><span class="p-suf">${s}</span></div>`;
    }

    function init() {
        const r = document.getElementById("rCol"), l = document.getElementById("lCol");
        r.innerHTML = ""; l.innerHTML = "";
        prayerData.forEach((p, i) => {
            const h = `<div class="prayer-item"><div class="p-name">${p.n}</div>${fmt12(p.h, p.m)}</div>`;
            if (i < 3) r.innerHTML += h; else l.innerHTML += h;
        });
    }

    function update() {
        const now = new Date();
        const [t, a] = now.toLocaleTimeString('en-US', {timeZone:'Asia/Riyadh', hour12:true, hour:'2-digit', minute:'2-digit'}).split(' ');
        document.getElementById("clock").innerText = t;
        document.getElementById("ampm").innerText = a === "AM" ? "صباحاً" : "مساءً";
        document.getElementById("miladi").innerText = now.toLocaleDateString('ar-SA', {day:'numeric', month:'long', year:'numeric'});
        document.getElementById("hijri").innerText = new Intl.DateTimeFormat('ar-SA-u-ca-islamic', {day:'numeric', month:'long', year:'numeric'}).format(now);

        let cur = now.getHours()*3600 + now.getMinutes()*60 + now.getSeconds();
        let next = 0;
        for(let p of prayerData) {
            let ps = p.h*3600 + p.m*60;
            if(ps > cur) { next = ps; break; }
        }
        if(!next) next = prayerData.h*3600 + prayerData.m*60 + 86400;
        let diff = next - cur;
        let h = Math.floor(diff/3600), m = Math.floor((diff%3600)/60), s = diff%60;
        document.getElementById("timer").innerText = `${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
    }

    init(); update(); setInterval(update, 1000);
    let z = 0; setInterval(() => { 
        const zElem = document.getElementById("zikr");
        zElem.style.opacity = 0;
        setTimeout(() => { zElem.innerText = azkar[++z % azkar.length]; zElem.style.opacity = 1; }, 600);
    }, 20000);
</script>
</body>
</html>
