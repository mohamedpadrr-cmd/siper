<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>شاشة المسجد - جامع الأمير فواز</title>
    <link href="https://fonts.googleapis.com" rel="stylesheet">
    <style>
        :root { --gold: #FFD700; --white: #ffffff; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Tajawal', sans-serif; }
        
        body { 
            background-color: #000; 
            width: 100vw; height: 100vh; 
            overflow: hidden; 
            display: flex; align-items: center; justify-content: center; 
        }

        .main-container {
            transform: rotate(90deg);
            width: 100vh; height: 100vw;
            display: grid;
            grid-template-columns: 22% 56% 22%; 
            background: linear-gradient(rgba(0,0,0,0.65), rgba(0,0,0,0.65)), 
                        url("bg.png") center/cover no-repeat;
            position: absolute;
            border: 3px solid var(--gold);
        }

        /* أعمدة الصلاة الجانبية */
        .prayer-column {
            display: flex; flex-direction: column;
            justify-content: space-around;
            background: rgba(0,0,0,0.5);
            padding: 2vh 0;
        }

        .border-right { border-right: 4px solid var(--gold); }
        .border-left { border-left: 4px solid var(--gold); }

        .prayer-card { text-align: center; }
        .p-label { font-size: 5.5vh; color: #fff; font-weight: 800; margin-bottom: 0.5vh; }
        .p-time { font-size: 7.5vh; color: var(--gold); font-weight: 900; text-shadow: 2px 2px 10px #000; }
        .p-suffix { font-size: 3.5vh; color: #fff; margin-right: 5px; font-weight: 700; }

        /* الجزء الأوسط */
        .center-content {
            display: flex; flex-direction: column;
            justify-content: space-between;
            padding: 3vh 0;
            text-align: center;
        }

        .date-section { margin-bottom: 1vh; }
        .date-text { font-size: 3.5vh; color: var(--gold); font-weight: 800; display: block; }
        
        /* اسم الجامع بزخرفة عريضة */
        .mosque-name { 
            font-family: 'Amiri', serif; 
            font-size: 9vh; 
            font-weight: 900; 
            color: var(--white); 
            margin-top: 1vh; 
            text-shadow: 0 0 20px var(--gold), 4px 4px 10px #000;
            letter-spacing: 2px;
        }

        #clock { font-size: 24vh; font-weight: 900; color: var(--gold); line-height: 1; text-shadow: 0 0 50px #000; }
        #ampm { font-size: 7vh; color: var(--white); font-weight: 800; }

        /* مربع العداد المعدل */
        .counter-box {
            background: rgba(255, 215, 0, 0.15);
            margin: 1vh 5vw;
            padding: 2vh;
            border-radius: 40px;
            border: 2px solid var(--gold);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 16vh;
        }
        #timer-label { font-size: 4vh; color: #fff; font-weight: 700; margin-bottom: 0.5vh; }
        #timer { 
            font-size: 9vh; 
            color: var(--gold); 
            font-weight: 900; 
            letter-spacing: 5px;
            text-shadow: 0 0 20px rgba(0,0,0,1);
            line-height: 1;
        }

        .zikr-box { height: 12vh; display: flex; align-items: center; justify-content: center; padding: 0 2vw; }
        #zikr { font-size: 7.5vh; font-weight: 800; color: var(--white); text-shadow: 3px 3px 20px #000; }
    </style>
</head>
<body>

<div class="main-container">
    <div class="prayer-column border-right" id="rightCol"></div>

    <div class="center-content">
        <div class="date-section">
            <span id="hijri" class="date-text">--</span>
            <span id="miladi" class="date-text">--</span>
            <div class="mosque-name">جامع الأمير فواز</div>
        </div>

        <div class="clock-main">
            <div id="clock">00:00</div>
            <div id="ampm">--</div>
        </div>

        <div class="counter-box">
            <div id="timer-label">الصلاة القادمة بعد</div>
            <div id="timer">00:00:00</div>
        </div>

        <div class="zikr-box">
            <div id="zikr">أستغفر الله العظيم وأتوب إليه</div>
        </div>
    </div>

    <div class="prayer-column border-left" id="leftCol"></div>
</div>

<script>
    // مواقيت الصلاة
    const prayerSchedule = [
        {name: "الفجر", h: 5, m: 10}, {name: "الشروق", h: 6, m: 34}, {name: "الظهر", h: 12, m: 20},
        {name: "العصر", h: 15, m: 34}, {name: "المغرب", h: 18, m: 6}, {name: "العشاء", h: 19, m: 31}
    ];

    function format12h(h, m) {
        let suffix = h >= 12 ? "م" : "ص";
        let hour12 = h % 12 || 12;
        return `${String(hour12).padStart(2, '0')}:${String(m).padStart(2, '0')} <span class="p-suffix">${suffix}</span>`;
    }

    function renderPrayers() {
        const rightCol = document.getElementById("rightCol");
        const leftCol = document.getElementById("leftCol");
        rightCol.innerHTML = ""; leftCol.innerHTML = "";
        
        prayerSchedule.forEach((p, index) => {
            const card = `<div class="prayer-card"><div class="p-label">${p.name}</div><div class="p-time">${format12h(p.h, p.m)}</div></div>`;
            if (index < 3) rightCol.innerHTML += card;
            else leftCol.innerHTML += card;
        });
    }

    function updateTime() {
        const now = new Date();
        const timeOptions = { timeZone: 'Asia/Riyadh', hour: '2-digit', minute: '2-digit', hour12: true };
        const [time, ampm] = now.toLocaleTimeString('en-US', timeOptions).split(' ');
        
        document.getElementById("clock").innerText = time;
        document.getElementById("ampm").innerText = ampm === "AM" ? "صباحاً" : "مساءً";
        document.getElementById("miladi").innerText = now.toLocaleDateString('ar-SA', {weekday:'long', day:'numeric', month:'long'});
        document.getElementById("hijri").innerText = new Intl.DateTimeFormat('ar-SA-u-ca-islamic', {day:'numeric', month:'long', year:'numeric'}).format(now);

        let currentTotalSecs = now.getHours() * 3600 + now.getMinutes() * 60 + now.getSeconds();
        let nextPrayerSecs = 0;

        for (let p of prayerSchedule) {
            let pSecs = p.h * 3600 + p.m * 60;
            if (pSecs > currentTotalSecs) { nextPrayerSecs = pSecs; break; }
        }
        if (nextPrayerSecs === 0) nextPrayerSecs = prayerSchedule[0].h * 3600 + prayerSchedule[0].m * 60 + 86400;

        let diff = nextPrayerSecs - currentTotalSecs;
        let h = Math.floor(diff / 3600);
        let m = Math.floor((diff % 3600) / 60);
        let s = diff % 60;
        document.getElementById("timer").innerText = `${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
    }

    renderPrayers();
    setInterval(updateTime, 1000);
    updateTime();

    const azkar = ["سبحان الله وبحمده", "لا إله إلا الله وحده لا شريك له", "اللهم صلِّ وسلم على نبينا محمد", "أستغفر الله العظيم وأتوب إليه", "سبحان الله والحمد لله"];
    let zIndex = 0;
    setInterval(() => {
        document.getElementById("zikr").innerText = azkar[zIndex];
        zIndex = (zIndex + 1) % azkar.length;
    }, 15000);
</script>

</body>
</html>
