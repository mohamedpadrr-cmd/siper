<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>شاشة جامع الأمير فواز</title>
    <link href="https://fonts.googleapis.com" rel="stylesheet">
    <style>
        :root { 
            --gold: #FFD700; 
            --white: #F5F5F5;
            --shadow: rgba(0, 0, 0, 0.9);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Tajawal', sans-serif; }
        
        body { 
            background-color: #000; 
            width: 100vw; height: 100vh; 
            overflow: hidden; 
            display: flex; align-items: center; justify-content: center; 
        }

        /* حاوية التدوير المصلحة */
        .main-container {
            transform: rotate(90deg);
            /* العرض والارتفاع معكوسين بسبب التدوير 90 درجة */
            width: 100vh; 
            height: 100vw;
            display: flex; flex-direction: column;
            background: linear-gradient(rgba(0,0,0,0.65), rgba(0,0,0,0.75)), 
                        url("bg.png") center/cover no-repeat;
            position: absolute;
            border: 4px solid var(--gold);
        }

        /* الجزء العلوي: الاسم والساعة */
        .top-section {
            height: 30vh;
            display: flex; flex-direction: column;
            justify-content: center;
            text-align: center;
            padding-top: 2vh;
        }

        .mosque-name { 
            font-family: 'Amiri', serif; 
            font-size: 8vh; 
            color: var(--white); 
            text-shadow: 0 0 20px var(--gold);
            margin-bottom: 1vh;
        }

        .clock-row { 
            display: flex; align-items: center; justify-content: center; gap: 2vw; 
        }
        #clock { 
            font-size: 18vh; 
            font-weight: 900; 
            color: var(--gold); 
            line-height: 1;
            text-shadow: 0 0 30px #000;
        }
        #ampm { font-size: 5vh; color: var(--white); font-weight: 800; }

        /* العداد التنازلي */
        .counter-area {
            height: 15vh;
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
        }
        .counter-box {
            background: rgba(255, 215, 0, 0.1);
            padding: 1.5vh 5vw;
            border-radius: 20px;
            border: 2px solid var(--gold);
            text-align: center;
        }
        #timer-label { font-size: 3vh; color: var(--white); margin-bottom: 0.5vh; }
        #timer { font-size: 6.5vh; color: var(--gold); font-weight: 900; letter-spacing: 3px; }

        /* الأذكار في المنتصف */
        .zikr-section {
            flex: 1;
            display: flex; align-items: center; justify-content: center;
            text-align: center; padding: 0 5vw;
        }
        #zikr { 
            font-size: 7vh; 
            font-weight: 800; 
            color: var(--white); 
            text-shadow: 4px 4px 15px #000;
            line-height: 1.3;
        }

        /* مواقيت الصلاة في الأسفل (3 يمين و 3 يسار) */
        .bottom-prayers {
            height: 32vh;
            display: grid;
            grid-template-columns: 1fr 1fr;
            border-top: 4px solid var(--gold);
            background: rgba(0,0,0,0.5);
        }

        .prayer-col {
            display: flex; flex-direction: column;
            justify-content: space-around;
            padding: 1vh 0;
        }
        .v-line { border-left: 2px solid rgba(255,215,0,0.3); }

        .prayer-item {
            display: flex; justify-content: space-between; align-items: center;
            padding: 0 5vw;
        }
        .p-name { font-size: 4.5vh; color: var(--white); font-weight: 800; }
        .p-val { font-size: 6.5vh; color: var(--gold); font-weight: 900; text-shadow: 2px 2px 8px #000; }
        .p-suf { font-size: 2.8vh; color: var(--white); margin-right: 5px; }

        .date-info { font-size: 3vh; color: var(--gold); font-weight: 700; margin-bottom: 1vh; }

    </style>
</head>
<body>

<div class="main-container">
    <div class="top-section">
        <div class="date-info">
            <span id="hijri">--</span> | <span id="miladi">--</span>
        </div>
        <div class="mosque-name">جامع الأمير فواز</div>
        <div class="clock-row">
            <div id="clock">00:00</div>
            <div id="ampm">--</div>
        </div>
    </div>

    <div class="counter-area">
        <div class="counter-box">
            <div id="timer-label">الصلاة القادمة بعد</div>
            <div id="timer">00:00:00</div>
        </div>
    </div>

    <div class="zikr-section">
        <div id="zikr">أستغفر الله العظيم وأتوب إليه</div>
    </div>

    <div class="bottom-prayers">
        <div class="prayer-col v-line" id="rCol"></div>
        <div class="prayer-col" id="lCol"></div>
    </div>
</div>

<script>
    const prayerData = [
        {n: "الفجر", h: 5, m: 10}, {n: "الشروق", h: 6, m: 34}, {n: "الظهر", h: 12, m: 20},
        {n: "العصر", h: 15, m: 34}, {n: "المغرب", h: 18, m: 6}, {n: "العشاء", h: 19, m: 31}
    ];

    function fmt12(h, m) {
        let s = h >= 12 ? "م" : "ص";
        let h12 = h % 12 || 12;
        return `${String(h12).padStart(2,'0')}:${String(m).padStart(2,'0')} <span class="p-suf">${s}</span>`;
    }

    function init() {
        const r = document.getElementById("rCol"), l = document.getElementById("lCol");
        prayerData.forEach((p, i) => {
            const h = `<div class="prayer-item"><div class="p-name">${p.n}</div><div class="p-val">${fmt12(p.h, p.m)}</div></div>`;
            if (i < 3) r.innerHTML += h; else l.innerHTML += h;
        });
    }

    function update() {
        const now = new Date();
        const [t, a] = now.toLocaleTimeString('en-US', {timeZone:'Asia/Riyadh', hour12:true, hour:'2-digit', minute:'2-digit'}).split(' ');
        document.getElementById("clock").innerText = t;
        document.getElementById("ampm").innerText = a === "AM" ? "صباحاً" : "مساءً";
        document.getElementById("miladi").innerText = now.toLocaleDateString('ar-SA', {weekday:'long', day:'numeric', month:'long'});
        document.getElementById("hijri").innerText = new Intl.DateTimeFormat('ar-SA-u-ca-islamic', {day:'numeric', month:'long', year:'numeric'}).format(now);

        let cur = now.getHours()*3600 + now.getMinutes()*60 + now.getSeconds();
        let next = 0;
        for(let p of prayerData) {
            let ps = p.h*3600 + p.m*60;
            if(ps > cur) { next = ps; break; }
        }
        if(!next) next = prayerData[0].h*3600 + prayerData[0].m*60 + 86400;
        let diff = next - cur;
        let h = Math.floor(diff/3600), m = Math.floor((diff%3600)/60), s = diff%60;
        document.getElementById("timer").innerText = `${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
    }

    init(); update(); setInterval(update, 1000);
    const azkar = ["سبحان الله وبحمده", "لا إله إلا الله وحده لا شريك له", "اللهم صلِّ وسلم على نبينا محمد", "أستغفر الله العظيم وأتوب إليه", "سبحان الله والحمد لله"];
    let z = 0; setInterval(() => { document.getElementById("zikr").innerText = azkar[++z % azkar.length]; }, 15000);
</script>
</body>
</html>
