<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>شاشة المسجد - جامع الأمير فواز</title>
    <link href="https://fonts.googleapis.com" rel="stylesheet">
    <style>
        :root { --gold: #FFD700; --white: #ffffff; }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Tajawal', sans-serif; }

        body {
            background-color: #000;
            width: 100vw; height: 100vh;
            overflow: hidden;
            display: flex; align-items: center; justify-content: center;
        }

        /* حاوية التدوير الطولي المعدلة */
        .main-container {
            transform: rotate(90deg);
            width: 100vh; height: 100vw;
            display: flex; flex-direction: column;
            
            /* تعديل طريقة عرض الخلفية لملء الشاشة بالكامل */
            background: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)), 
                        url("bg.png") center/cover no-repeat; /* تم تغييرها لـ cover */
            position: absolute;
            box-shadow: inset 0 0 100px #000;
        }

        /* الجزء العلوي - زيادة الحجم ليناسب الـ 85 بوصة */
        .header {
            height: 15vh;
            display: flex; justify-content: space-between; align-items: center;
            padding: 0 5vw; border-bottom: 8px solid var(--gold);
            background: rgba(0,0,0,0.5);
        }

        .date-text { font-size: 4.5vh; color: var(--gold); font-weight: 800; }
        
        .mosque-name { 
            text-align: center; 
            font-size: 9vh; /* تكبير اسم المسجد */
            font-weight: 900; 
            color: var(--white); 
            margin-top: 6vh; 
            text-shadow: 5px 5px 20px #000; 
        }

        /* الساعة المركزية - جعلها أوضح */
        .clock-section { text-align: center; margin-top: 4vh; flex-grow: 1; display: flex; flex-direction: column; justify-content: center; }
        #clock { font-size: 32vh; font-weight: 900; color: var(--gold); line-height: 0.8; text-shadow: 0 0 60px rgba(0,0,0,1); }
        #ampm { font-size: 8vh; color: var(--white); font-weight: 800; margin-top: 2vh; }

        /* الأذكار */
        .zikr-area { height: 20vh; display: flex; align-items: center; justify-content: center; text-align: center; padding: 0 5vw; }
        #zikr { font-size: 9vh; font-weight: 800; color: var(--white); text-shadow: 4px 4px 30px #000; }

        /* مواقيت الصلاة - زيادة التباين */
        .prayer-grid {
            height: 38vh;
            display: grid; grid-template-columns: repeat(3, 1fr); grid-template-rows: repeat(2, 1fr);
            background: rgba(0, 0, 0, 0.9); border-top: 8px solid var(--gold);
        }

        .prayer-card { display: flex; flex-direction: column; align-items: center; justify-content: center; border: 1px solid rgba(255, 215, 0, 0.3); }
        .p-label { font-size: 5vh; color: #ddd; font-weight: 800; }
        .p-time { font-size: 8.5vh; color: var(--gold); font-weight: 900; }
        .p-suffix { font-size: 3.5vh; color: #fff; margin-right: 8px; }
    </style>
</head>
<body>

<div class="main-container">
    <div class="header">
        <div id="hijri" class="date-text">--</div>
        <div id="miladi" class="date-text">--</div>
    </div>

    <div class="mosque-name">جامع الأمير فواز – جدة</div>

    <div class="clock-section">
        <div id="clock">00:00</div>
        <div id="ampm">--</div>
    </div>

    <div class="zikr-area">
        <div id="zikr">أستغفر الله العظيم وأتوب إليه</div>
    </div>

    <div class="prayer-grid" id="prayerGrid"></div>
</div>

<script>
    // مواقيت الصلاة (تأكد من تعديلها يدوياً أو ربطها بـ API)
    const prayerTimes = [
        {name: "الفجر", time: "05:10", suf: "ص"},
        {name: "الشروق", time: "06:34", suf: "ص"},
        {name: "الظهر", time: "12:20", suf: "م"},
        {name: "العصر", time: "03:34", suf: "م"},
        {name: "المغرب", time: "06:06", suf: "م"},
        {name: "العشاء", time: "07:31", suf: "م"}
    ];

    const grid = document.getElementById("prayerGrid");
    prayerTimes.forEach(p => {
        const div = document.createElement("div");
        div.className = "prayer-card";
        div.innerHTML = `<div class="p-label">${p.name}</div><div class="p-time">${p.time}<span class="p-suffix">${p.suf}</span></div>`;
        grid.appendChild(div);
    });

    function updateJeddahTime() {
        const now = new Date();
        const jeddahTime = now.toLocaleTimeString('en-US', { timeZone: 'Asia/Riyadh', hour12: true, hour: '2-digit', minute: '2-digit' });
        
        const [time, ampm] = jeddahTime.split(' ');
        document.getElementById("clock").innerText = time;
        document.getElementById("ampm").innerText = ampm === "AM" ? "صباحاً" : "مساءً";

        const options = { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' };
        document.getElementById("miladi").innerText = now.toLocaleDateString('ar-SA', options);
        document.getElementById("hijri").innerText = new Intl.DateTimeFormat('ar-SA-u-ca-islamic', options).format(now);
    }

    const azkar = ["سبحان الله وبحمده", "لا إله إلا الله وحده لا شريك له", "اللهم صلِّ وسلم على نبينا محمد", "أستغفر الله العظيم وأتوب إليه"];
    let zIndex = 0;
    setInterval(() => {
        document.getElementById("zikr").innerText = azkar[zIndex];
        zIndex = (zIndex + 1) % azkar.length;
    }, 15000);

    setInterval(updateJeddahTime, 1000);
    updateJeddahTime();
</script>

</body>
</html>
