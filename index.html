<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>شاشة جامع الأمير فواز</title>
    <link href="https://fonts.googleapis.com" rel="stylesheet">
    <style>
        /* الألوان المتناسقة مع الكعبة والخشب */
        :root { 
            --gold-bright: #FFD700; /* ذهبي ساطع للأرقام */
            --gold-muted: #D4AF37;  /* ذهبي مطفي للعناوين */
            --white-soft: #F5F5F5;  /* أبيض ناعم للنصوص الثانوية */
            --shadow: rgba(0, 0, 0, 0.8);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Tajawal', sans-serif; }
        
        body { 
            background-color: #000; 
            width: 100vw; height: 100vh; 
            overflow: hidden; 
            display: flex; align-items: center; justify-content: center; 
        }

        .main-container {
            transform: rotate(90deg);
            width: 100vh; height: 100vw;
            display: flex; flex-direction: column;
            background: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.7)), 
                        url("bg.png") center/cover no-repeat;
            position: absolute;
            border: 5px solid var(--gold-muted);
        }

        /* الجزء العلوي */
        .top-section {
            height: 32vh;
            display: flex; flex-direction: column;
            justify-content: space-between;
            padding: 2vh 0;
            text-align: center;
        }

        .mosque-name { 
            font-family: 'Amiri', serif; 
            font-size: 8vh; 
            color: var(--white-soft); 
            text-shadow: 0 0 20px var(--gold-bright); 
        }

        .date-bar { font-size: 2.8vh; color: var(--gold-muted); font-weight: 700; margin-bottom: 0.5vh; }

        /* الساعة - لون ذهبي متوهج */
        #clock { 
            font-size: 16vh; 
            font-weight: 900; 
            color: var(--gold-bright); 
            line-height: 1; 
            text-shadow: 0 0 30px var(--shadow), 0 0 10px rgba(255,215,0,0.5); 
        }
        #ampm { font-size: 5vh; color: var(--white-soft); font-weight: 800; }
        
        /* العداد التنازلي */
        .counter-box {
            background: rgba(212, 175, 55, 0.1); /* خلفية ذهبية شفافة */
            margin: 0 18vw; padding: 1.2vh;
            border-radius: 20px; border: 1.5px solid var(--gold-muted);
        }
        #timer-label { font-size: 3vh; color: var(--white-soft); font-weight: 700; }
        #timer { font-size: 6vh; color: var(--gold-bright); font-weight: 900; letter-spacing: 2px; }

        /* الأذكار */
        .zikr-section {
            flex: 1;
            display: flex; align-items: center; justify-content: center;
            text-align: center; padding: 0 5vw;
        }
        #zikr { 
            font-size: 7.5vh; 
            font-weight: 800; 
            color: var(--white-soft); 
            text-shadow: 4px 4px 15px var(--shadow); 
            line-height: 1.4; 
        }

        /* مواقيت الصلاة - منظمة وملونة */
        .bottom-prayer-section {
            height: 35vh;
            display: grid;
            grid-template-columns: 1fr 1fr;
            border-top: 4px solid var(--gold-muted);
            background: rgba(0,0,0,0.4);
        }

        .prayer-column {
            display: flex; flex-direction: column;
            justify-content: space-around;
            padding: 1.5vh 0;
        }
        .border-left { border-left: 2px solid var(--gold-muted); }

        .prayer-card {
            display: flex; justify-content: space-between; align-items: center;
            padding: 0 5vw;
        }
        .p-label { font-size: 5vh; color: var(--white-soft); font-weight: 800; }
        .p-time { 
            font-size: 6.5vh; 
            color: var(--gold-bright); 
            font-weight: 900; 
            text-shadow: 2px 2px 8px var(--shadow); 
        }
        .p-suffix { font-size: 3vh; color: var(--white-soft); margin-right: 6px; font-weight: 700; }

    </style>
</head>
<body>

<div class="main-container">
    <div class="top-section">
        <div>
            <div class="date-bar"><span id="hijri">--</span> | <span id="miladi">--</span></div>
            <div class="mosque-name">جامع الأمير فواز</div>
        </div>
        <div style="display: flex; align-items: center; justify-content: center; gap: 2vw;">
            <div id="clock">00:00</div>
            <div id="ampm">--</div>
        </div>
        <div class="counter-box">
            <div id="timer-label">الصلاة القادمة بعد</div>
            <div id="timer">00:00:00</div>
        </div>
    </div>

    <div class="zikr-section">
        <div id="zikr">أستغفر الله العظيم وأتوب إليه</div>
    </div>

    <div class="bottom-prayer-section">
        <div class="prayer-column border-left" id="rightPr"></div>
        <div class="prayer-column" id="leftPr"></div>
    </div>
</div>

<script>
    // مواقيت الصلاة - يرجى تعديلها حسب تقويم مدينتك
    const prayers = [
        {name: "الفجر", h: 5, m: 10}, {name: "الشروق", h: 6, m: 34}, {name: "الظهر", h: 12, m: 20},
        {name: "العصر", h: 15, m: 34}, {name: "المغرب", h: 18, m: 6}, {name: "العشاء", h: 19, m: 31}
    ];

    function format12(h, m) {
        let s = h >= 12 ? "م" : "ص";
        let h12 = h % 12 || 12;
        return `${String(h12).padStart(2,'0')}:${String(m).padStart(2,'0')} <span class="p-suffix">${s}</span>`;
    }

    function render() {
        const r = document.getElementById("rightPr"), l = document.getElementById("leftPr");
        prayers.forEach((p, i) => {
            const html = `<div class="prayer-card"><div class="p-label">${p.name}</div><div class="p-time">${format12(p.h, p.m)}</div></div>`;
            if (i < 3) r.innerHTML += html; else l.innerHTML += html;
        });
    }

    function update() {
        const now = new Date();
        const [t, a] = now.toLocaleTimeString('en-US', {timeZone:'Asia/Riyadh', hour12:true, hour:'2-digit', minute:'2-digit'}).split(' ');
        document.getElementById("clock").innerText = t;
        document.getElementById("ampm").innerText = a === "AM" ? "صباحاً" : "مساءً";
        document.getElementById("miladi").innerText = now.toLocaleDateString('ar-SA', {weekday:'long', day:'numeric', month:'long'});
        document.getElementById("hijri").innerText = new Intl.DateTimeFormat('ar-SA-u-ca-islamic', {day:'numeric', month:'long', year:'numeric'}).format(now);

        let cur = now.getHours()*3600 + now.getMinutes()*60 + now.getSeconds();
        let next = 0;
        for(let p of prayers) {
            let ps = p.h*3600 + p.m*60;
            if(ps > cur) { next = ps; break; }
        }
        if(!next) next = prayers[0].h*3600 + prayers[0].m*60 + 86400;
        let diff = next - cur;
        let h = Math.floor(diff/3600), m = Math.floor((diff%3600)/60), s = diff%60;
        document.getElementById("timer").innerText = `${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
    }

    render(); update(); setInterval(update, 1000);
    const azkar = ["سبحان الله وبحمده", "لا إله إلا الله وحده لا شريك له", "اللهم صلِّ وسلم على نبينا محمد", "أستغفر الله العظيم وأتوب إليه", "سبحان الله والحمد لله"];
    let z = 0; setInterval(() => { document.getElementById("zikr").innerText = azkar[++z % azkar.length]; }, 15000);
</script>
</body>
</html>
