<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>شاشة جامع الأمير فواز - النسخة النهائية</title>
    <link href="https://fonts.googleapis.com" rel="stylesheet">
    <style>
        :root { --gold: #FFD700; --white: #F5F5F5; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Tajawal', sans-serif; }
        
        body { 
            background-color: #000; width: 100vw; height: 100vh; 
            overflow: hidden; display: flex; align-items: center; justify-content: center; 
        }

        .main-container {
            transform: rotate(90deg);
            width: 100vh; height: 100vw;
            display: flex; flex-direction: column;
            background: linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.7)), 
                        url("bg.png") center/cover no-repeat;
            position: absolute; border: 5px solid var(--gold);
        }

        /* الجزء العلوي: الساعة واسم الجامع */
        .top-section {
            height: 28vh;
            display: flex; flex-direction: column;
            justify-content: center; text-align: center;
            padding-top: 1vh;
        }

        .clock-row { display: flex; align-items: center; justify-content: center; gap: 2vw; }
        #clock { font-size: 14vh; font-weight: 900; color: var(--gold); line-height: 1; text-shadow: 0 0 30px #000; }
        #ampm { font-size: 4.5vh; color: var(--white); font-weight: 800; }

        .mosque-name { font-family: 'Amiri', serif; font-size: 7.5vh; color: var(--white); text-shadow: 0 0 15px var(--gold); margin-top: 0.5vh; }
        .date-info { font-size: 2.8vh; color: var(--gold); font-weight: 700; margin-top: 0.5vh; }

        /* الجزء الأوسط: الأذكار والأحاديث */
        .zikr-section {
            flex: 1; display: flex; align-items: center; justify-content: center;
            text-align: center; padding: 0 6vw;
        }
        #zikr { 
            font-size: 6.5vh; font-weight: 800; color: var(--white); 
            text-shadow: 4px 4px 15px #000; line-height: 1.4; 
            transition: opacity 0.5s ease-in-out;
        }

        /* منطقة العداد: فوق مواقيت الصلاة مباشرة */
        .counter-area { display: flex; justify-content: center; margin-bottom: 1.5vh; }
        .counter-box {
            background: rgba(255, 215, 0, 0.15);
            width: 65vw; padding: 1.2vh;
            border-radius: 20px; border: 2px solid var(--gold);
            text-align: center;
        }
        #timer-label { font-size: 2.8vh; color: var(--white); margin-bottom: 0.5vh; }
        #timer { font-size: 6.5vh; color: var(--gold); font-weight: 900; letter-spacing: 4px; line-height: 1; }

        /* الجزء السفلي: مواقيت الصلاة (3 يمين و 3 يسار) */
        .bottom-prayers {
            height: 38vh;
            display: grid; grid-template-columns: 1fr 1fr;
            border-top: 4px solid var(--gold); background: rgba(0,0,0,0.6);
        }

        .prayer-col { display: flex; flex-direction: column; justify-content: space-around; padding: 1vh 0; }
        .v-line { border-left: 2px solid rgba(255,215,0,0.3); }

        .prayer-item { display: flex; justify-content: space-between; align-items: center; padding: 0 4vw; }
        .p-name { font-size: 4.5vh; color: var(--white); font-weight: 800; }
        
        .p-val-box { display: flex; align-items: baseline; white-space: nowrap; }
        .p-val { font-size: 6.5vh; color: var(--gold); font-weight: 900; text-shadow: 2px 2px 8px #000; }
        .p-suf { font-size: 3vh; color: var(--white); margin-right: 8px; font-weight: 700; }
    </style>
</head>
<body>

<div class="main-container">
    <div class="top-section">
        <div class="clock-row">
            <div id="clock">00:00</div>
            <div id="ampm">--</div>
        </div>
        <div class="mosque-name">جامع الأمير فواز</div>
        <div class="date-info"><span id="hijri">--</span> | <span id="miladi">--</span></div>
    </div>

    <div class="zikr-section">
        <div id="zikr">أستغفر الله العظيم وأتوب إليه</div>
    </div>

    <div class="counter-area">
        <div class="counter-box">
            <div id="timer-label">الصلاة القادمة بعد</div>
            <div id="timer">00:00:00</div>
        </div>
    </div>

    <div class="bottom-prayers">
        <div class="prayer-col v-line" id="rCol"></div>
        <div class="prayer-col" id="lCol"></div>
    </div>
</div>

<script>
    // مواقيت الصلاة
    const prayerData = [
        {n: "الفجر", h: 5, m: 10}, {n: "الشروق", h: 6, m: 34}, {n: "الظهر", h: 12, m: 20},
        {n: "العصر", h: 15, m: 34}, {n: "المغرب", h: 18, m: 6}, {n: "العشاء", h: 19, m: 31}
    ];

    // قائمة الأذكار والأحاديث من البخاري ومسلم
    const azkar = [
        "قال ﷺ: كَلِمَتَانِ خَفِيفَتَانِ عَلَى اللِّسَانِ، ثَقِيلَتَانِ فِي الْمِيزَانِ: سُبْحَانَ اللهِ وَبِحَمْدِهِ، سُبْحَانَ اللهِ الْعَظِيمِ (البخاري)",
        "قال ﷺ: مَنْ صَلَّى عَلَيَّ صَلَاةً وَاحِدَةً صَلَّى اللهُ عَلَيْهِ بِهَا عَشْرًا (مسلم)",
        "قال ﷺ: لَا حَوْلَ وَلَا قُوَّةَ إِلَّا بِاللهِ كَنْزٌ مِنْ كُنُوزِ الْجَنَّةِ (البخاري ومسلم)",
        "قال ﷺ: أَحَبُّ الْكَلَامِ إِلَى اللهِ أَرْبَعٌ: سُبْحَانَ اللهِ، وَالْحَمْدُ للهِ، وَلَا إِلَهَ إِلَّا اللهُ، وَاللهُ أَكْبَرُ (مسلم)",
        "قال ﷺ: مَنْ قَالَ سُبْحَانَ اللهِ وَبِحَمْدِهِ فِي يَوْمٍ مِائَةَ مَرَّةٍ حُطَّتْ خَطَايَاهُ وَإِنْ كَانَتْ مِثْلَ زَبَدِ الْبَحْرِ (البخاري)",
        "قال ﷺ: لأَنْ أَقُولَ سُبْحَانَ اللهِ، وَالْحَمْدُ للهِ، وَلَا إِلَهَ إِلا اللهُ، وَاللهُ أَكْبَرُ، أَحَبُّ إِلَيَّ مِمَّا طَلَعَتْ عَلَيْهِ الشَّمْسُ (مسلم)",
        "اللهم إني أسألك الهدى والتقى والعفاف والغنى (مسلم)",
        "اللهم اغفر لي، وارحمني، واهدني، وعافني، وارزقني (مسلم)",
        "لا إله إلا الله وحده لا شريك له، له الملك وله الحمد وهو على كل شيء قدير (البخاري)",
        "يا حي يا قيوم برحمتك أستغيث، أصلح لي شأني كله ولا تكلني إلى نفسي طرفة عين",
        "سبحان الله والحمد لله ولا إله إلا الله والله أكبر",
        "أستغفر الله العظيم وأتوب إليه"
    ];

    function fmt12(h, m) {
        let s = h >= 12 ? "م" : "ص";
        let h12 = h % 12 || 12;
        return `<div class="p-val-box"><span class="p-val">${String(h12).padStart(2,'0')}:${String(m).padStart(2,'0')}</span><span class="p-suf">${s}</span></div>`;
    }

    function init() {
        const r = document.getElementById("rCol"), l = document.getElementById("lCol");
        prayerData.forEach((p, i) => {
            const html = `<div class="prayer-item"><div class="p-name">${p.n}</div>${fmt12(p.h, p.m)}</div>`;
            if (i < 3) r.innerHTML += html; else l.innerHTML += html;
        });
    }

    function update() {
        const now = new Date();
        const [t, a] = now.toLocaleTimeString('en-US', {timeZone:'Asia/Riyadh', hour12:true, hour:'2-digit', minute:'2-digit'}).split(' ');
        document.getElementById("clock").innerText = t;
        document.getElementById("ampm").innerText = a === "AM" ? "صباحاً" : "مساءً";
        document.getElementById("miladi").innerText = now.toLocaleDateString('ar-SA', {weekday:'long', day:'numeric', month:'long'});
        document.getElementById("hijri").innerText = new Intl.DateTimeFormat('ar-SA-u-ca-islamic', {day:'numeric', month:'long', year:'numeric'}).format(now);

        let cur = now.getHours()*3600 + now.getMinutes()*60 + now.getSeconds();
        let next = 0;
        for(let p of prayerData) {
            let ps = p.h*3600 + p.m*60;
            if(ps > cur) { next = ps; break; }
        }
        if(!next) next = prayerData[0].h*3600 + prayerData[0].m*60 + 86400;
        let diff = next - cur;
        let h = Math.floor(diff/3600), m = Math.floor((diff%3600)/60), s = diff%60;
        document.getElementById("timer").innerText = `${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
    }

    init(); update(); setInterval(update, 1000);
    
    // تبديل الأذكار كل 25 ثانية لفرصة القراءة
    let z = 0; 
    setInterval(() => { 
        const zElem = document.getElementById("zikr");
        zElem.style.opacity = 0;
        setTimeout(() => {
            zElem.innerText = azkar[++z % azkar.length];
            zElem.style.opacity = 1;
        }, 500);
    }, 25000);
</script>
</body>
</html>
